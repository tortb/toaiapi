version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: toaiapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: toaiapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toaiapi123}
      POSTGRES_DB: toaiapi
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toaiapi']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: toaiapi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-toaiapi123}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-toaiapi123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: toaiapi-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://toaiapi:${POSTGRES_PASSWORD:-toaiapi123}@postgres:5432/toaiapi
      REDIS_URL: redis://:${REDIS_PASSWORD:-toaiapi123}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    ports:
      - '${BACKEND_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: toaiapi-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - backend

  # Admin
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: toaiapi-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '${ADMIN_PORT:-3002}:3002'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
